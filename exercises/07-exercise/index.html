<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-exercise</title>
</head>

<body>
 
    <button id="hover-btn" class="hover-button">Hover over Me</button>


    <h2>Volume Control</h2>
      <p class="instruction">
        <strong>Goal:</strong> Control audio volume with a slider
      </p>
      <button id="volume-play-btn" class="sound-button">🔊 Play Sound</button>
      <div style="margin: 1rem 0;">
        <label for="volume-slider" style="display: block; margin-bottom: .5rem;">Volume:</label>
        <input type="range" id="volume-slider" min="0" max="100" value="50" style="width: 100%;">
        <p id="volume-display" style="font-size: 1.2rem; font-weight: bold; color: #000d47; margin-top: 0.5rem;">Volume: 50%</p>
      </div>



  <script src="./scripts/app.js"></script>
</body>
</html>
