<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounds</title>
</head>
<body>
    <button id="play-sound-btn" class="sound-button">🔊 Play Sound</button>
    
    <div class="button-grid">
        <button id="sound-1" class="sound-button">🎵 Sound 1</button>
        <button id="sound-2" class="sound-button">🎶 Sound 2</button>
        <button id="sound-3" class="sound-button">🎼 Sound 3</button>
      </div>

      <div>
        <button id="play-btn" class="sound-button">▶️ Play</button>
        <button id="pause-btn" class="sound-button">⏸️ Pause</button>
        <button id="stop-btn" class="sound-button">⏹️ Stop</button>
      </div>

      <script src="./script.js"></script>
</body>
</html>
